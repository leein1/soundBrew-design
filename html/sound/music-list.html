<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>music</title>
    <!-- module css -->
    <th:insert fragment="sort :: sortCssModule"></th:insert>
    <th:insert fragment="tag :: tagCssModule"></th:insert>
    <th:insert fragment="music :: musicCssModule"></th:insert>
</head>
<body>
    <div class="content">
        <div class="content-header">
            <!-- tag body -->
            <th:insert fragment="tag :: tagModule"></th:insert>
            <!-- sort body -->
            <th:insert fragment="sort :: sortModule"></th:insert>
        </div>
        <!-- music body -->
        <th:insert fragment="music :: musicModule"></th:insert>
    </div>
</body>
    <!-- module js -->
    <th:insert fragment="tag :: tagJsModule"></th:insert>
    <th:insert fragment="sort :: sortJsModule"></th:insert>
    <th:insert fragment="music :: musicJsModule"></th:insert>
</html>
