<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album List Page</title>

    <!-- 기본 css -->
    <link href="../css/layout.css" rel="stylesheet">
    <link href="../css/common.css" rel="stylesheet">

    <!-- 태그 관련 css -->
    <link href="../css/music.css" rel="stylesheet">

    <link href="../css/album-list.css" rel="stylesheet">
    <link href="../css/album.css" rel="stylesheet">
</head>
<body>
    <div class="content">


        <hr style="border: 1px solid #eee;">
        <div class="content-tag">
            <div class="music-tag-sort">
                <div class="music-tag-sort-list">
                    <img src="../images/label_48dp_5F6368_FILL0_wght400_GRAD0_opsz48.svg" alt="태그">
                    <span class="music-tag-sort-toggle" data-target="instrument">악기</span>
                    <img src="../images/arrow_drop_down_48dp_5F6368_FILL0_wght400_GRAD0_opsz48.svg" alt="늘리기">
                    <span class="music-tag-sort-toggle" data-target="mood">분위기</span>
                    <img src="../images/arrow_drop_down_48dp_5F6368_FILL0_wght400_GRAD0_opsz48.svg" alt="늘리기">
                    <span class="music-tag-sort-toggle" data-target="genre">장르</span>
                    <img src="../images/arrow_drop_down_48dp_5F6368_FILL0_wght400_GRAD0_opsz48.svg" alt="늘리기">
                </div>
                
                <div class="music-tag-display"></div>
            </div>
    
            <div class="music-sort">
                <span class="music-sort-left" id="sortKeyword">정렬
                    <img src="../images/swap_vert_48dp_5F6368_FILL0_wght400_GRAD0_opsz48.svg" alt="정렬" id="sortIcon"> 
                </span>
                <!-- 정렬 드롭다운 -->
                <div class="music-sort-menu" id="musicSortMenu">
                    <ul>
                        <li data-sort="download">다운로드순</li>
                        <li data-sort="name">이름순</li>
                        <li data-sort="length">길이순</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="other-albums">
            <h2 class="other-albums-title" style="margin-top: 25px;">5개의 검색결과</h2>
            <h1 class="other-albums-title" style="font-size: 15px;">정렬 : 다운로드 순</h1>
            <div class="other-albums-list">
                <div class="other-album-item">
                    <img class="other-album-image" src="../images/sample-album-imge.png" alt="Album Image">
                    <div class="other-album-name">Album Name 1</div>
                    <div class="other-album-artist">Jonsi</div>
                </div>
                <div class="other-album-item">
                    <img class="other-album-image" src="../images/sample-album-imge.png" alt="Album Image">
                    <div class="other-album-name">Album Name 1</div>
                    <div class="other-album-artist">Jonsi</div>
                </div>
                <div class="other-album-item">
                    <img class="other-album-image" src="../images/sample-album-imge.png" alt="Album Image">
                    <div class="other-album-name">Album Name 1</div>
                    <div class="other-album-artist">Jonsi</div>
                </div>
                <div class="other-album-item">
                    <img class="other-album-image" src="../images/sample-album-imge.png" alt="Album Image">
                    <div class="other-album-name">Album Name 2</div>
                    <div class="other-album-artist">Jonsi</div>
                </div>
                <div class="other-album-item">
                    <img class="other-album-image" src="../images/sample-album-imge.png" alt="Album Image">
                    <div class="other-album-name">Album Name 3</div>
                    <div class="other-album-artist">Jonsi</div>
                </div>
            </div>
        </div>
        
    </div>

    </div><!-- end content -->

    <!-- 태그 관련 스크립트 -->
<script src="../script/tagStates.js"></script>
<script src="../script/music.js"></script>


</body>
</html>
